*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{

background:#050816;

color:white;

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

width:500px;

height:500px;

background:#5B21B6;

border-radius:50%;

filter:blur(170px);

top:-180px;

left:-150px;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:450px;

height:450px;

background:#2563EB;

border-radius:50%;

filter:blur(170px);

bottom:-170px;

right:-150px;

z-index:-2;

}

left:0;

width:100%;

padding:20px 9%;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

z-index:1000;

}

.logo{

font-size:28px;

font-weight:800;

letter-spacing:1px;

color:white;

}

nav ul{

display:flex;

list-style:none;

gap:35px;

}

nav ul li a{

text-decoration:none;

color:white;

font-weight:500;

transition:.3s;

}

nav ul li a:hover{

color:#60A5FA;

}

.hero{

min-height:100vh;

display:flex;

justify-content:center;

}

.hero-box{

justify-content:space-between;

.right{

.right img{

object-fit:cover;

border:6px solid rgba(255,255,255,.3);

box-shadow:0 0 60px rgba(96,165,250,.6);

transition:.5s;

}

.right img:hover{

transform:scale(1.05);

box-shadow:0 0 90px rgba(147,51,234,.9);
}
  .left h3{
    font-size:28px;
    color:#60A5FA;
    margin-bottom:20px;
  }
  .left h1{
    font-size:72px;
    line-height:1.1;
    margin-bottom:20px;
  }
  .left p{

    line-height:1.8;
    color:#d1d5db;
    margin-bottoom:35px;
  }
.buttons{

display:flex;

gap:20px;

flex-wrap:wrap;

}

.btn{

padding:15px 34px;

background:linear-gradient(135deg,#3B82F6,#8B5CF6);

color:white;

text-decoration:none;

font-weight:600;

border-radius:50px;

transition:.4s;

box-shadow:0 10px 30px rgba(59,130,246,.4);

}

.btn:hover{

transform:translateY(-6px);

box-shadow:0 15px 40px rgba(139,92,246,.6);

}

.btn-outline{

display:inline-block;

padding:15px 34px;

border:2px solid #60A5FA;

color:white;

text-decoration:none;

font-weight:600;

border-radius:50px;

transition:.4s;

}

.btn-outline:hover{

background:#60A5FA;

transform:translateY(-6px);

}

section{

padding:90px 10%;

}

.card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

border-radius:25px;

padding:35px;

margin-bottom:35px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

transition:.4s;

}

.card:hover{

transform:translateY(-10px);

}

h2{

font-size:40px;

margin-bottom:25px;

color:#60A5FA;

}

@media(max-width:900px){

.hero-box{

flex-direction:column-reverse;

text-align:center;

}

}

.right img{

width:250px;

height:250px;

padding:18px 6%;

nav ul{

display:none;
